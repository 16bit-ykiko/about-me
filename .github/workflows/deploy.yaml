name: pages

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *"

  push:
    branches:
      - "**"

  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python3 -m pip install uv

      - name: Sync Python dependencies
        run: uv sync --frozen --only-group ci

      - name: Validate scripts
        run: uv run --frozen --only-group ci --no-sync python -m py_compile scripts/*.py

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python3 -m pip install uv

      - name: Sync Python dependencies
        run: uv sync --frozen --only-group ci

      - name: Sync articles from Zhihu
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        env:
          ZHIHU_COOKIE: ${{ secrets.ZHIHU_COOKIE }}
        run: uv run --frozen --only-group ci --no-sync python scripts/zhihu_cli.py sync

      - name: Commit synced articles
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A website/content/zh-cn/articles
          if git diff --cached --quiet; then
            echo "No synced article changes."
            exit 0
          fi
          git commit -m "chore: sync Zhihu articles [skip ci]"
          git push

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "0.141.0"

      - name: Build
        run: |
          cd website
          git clone https://github.com/nunocoracao/blowfish.git themes/blowfish --depth=1
          hugo

      - name: Deploy
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: website/public
