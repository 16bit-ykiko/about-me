name: CI Debug Session
on:
  pull_request:
    branches: [main]

jobs:
  build:
    # 使用 GitHub 当前支持的最新 macOS 版本
    runs-on: macos-latest

    steps:
      # 1. 更新 checkout action 到最新的 v4 版本
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 将 upterm 步骤放在最后，并添加 if: always() 以确保它总能运行
      - name: Setup upterm session
        if: always() # 确保无论前面步骤成功与否，此步骤都会执行
        uses: lhotari/action-upterm@v1
        with:
          limit-access-to-actor: false