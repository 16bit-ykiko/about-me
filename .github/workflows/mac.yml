name: CI Debug via tmate

on:
  pull_request:

jobs:
  debug_session:
    runs-on: macos-latest

    steps:
      - name: Checkout code

        uses: actions/checkout@v4

      # The tmate step starts the session

      - name: Start tmate debug session

        if: always()

        uses: mxschmitt/action-tmate@v3

      # This new step forces the job to wait for 20 minutes

      - name: Keep session alive

        if: always()

        run: sleep 1200 # 1200 seconds = 20 minutes
