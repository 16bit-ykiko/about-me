name: CI Debug via tmate

on:
  pull_request: # 您可以根据需要修改触发条件

jobs:
  debug_session:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 如果您的项目需要特定环境，请将相关设置步骤放在这里
      # 例如: actions/setup-node, actions/setup-java 等

      - name: Start tmate debug session
        # 使用 if: always() 确保无论如何都能启动调试
        if: always()
        uses: mxschmitt/action-tmate@v3